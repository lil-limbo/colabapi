name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is the point of this workflow: colabapi's whole claim is
        # that it runs where Google's Colab CLI cannot, and that claim is worth
        # nothing unless it is tested on a real Windows runner every push.
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.14 is what python.org hands a new user who clicks the big download
        # button, so the default-user version must never be the untested one.
        python: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Windows compatibility layer
        run: python tests/test_windows_compat.py

      - name: CLI survives a legacy-code-page (cp1252) captured stdout
        # Captured output is what a log file, an IDE, CI itself, or the
        # Scheduled Task sees; the CLI must print its glyphs there without a
        # UnicodeEncodeError on any OS.
        run: python tests/test_windows_encoding.py

      - name: Real console -- raw mode and injected keystrokes
        # On Windows this allocates a genuine console, flips raw mode through the
        # Win32 API for real, and pushes synthetic arrow/Ctrl+C/Unicode keys into
        # its input queue to assert what the remote shell would receive. This is
        # the only test that exercises the console code rather than reasoning
        # about it. Elsewhere it checks the pure key table and exits.
        run: python tests/test_windows_console.py

      - name: Reconnect state machine
        run: python tests/test_reconnect.py

      - name: WebSocket close semantics
        run: python tests/test_close_semantics.py

      - name: Registry UninstallString detects pipx and unregisters first
        # The string this writes is executed months later by a user clicking
        # Uninstall in Settings; a wrong branch there corrupts the install
        # (seen on a real machine in the 0.2.2 report), so its contract is
        # pinned by test on every OS.
        run: python tests/test_winreg_uninstall.py

      - name: End-to-end console (fake /colab/tty)
        run: python tests/test_e2e_console.py

      - name: CLI starts and reports its environment
        run: |
          colabapi --version
          colabapi doctor

      - name: Google's CLI is driveable through the shim
        run: python -m colabapi._colab_shim --help

      - name: Scheduled Task installs and uninstalls (Windows only)
        if: runner.os == 'Windows'
        # The background service is what keeps a session alive across logout and
        # reboot, so "it registered a task" is a load-bearing claim, not a detail.
        # schtasks must exit 0 and the task must actually be queryable afterwards.
        run: |
          colabapi service install
          schtasks /Query /TN colabapi
          colabapi service status
          colabapi service uninstall
          # A missing task is what we WANT here, and schtasks reports that by
          # exiting non-zero. pwsh would otherwise carry that last exit code out
          # of the step and fail the job for succeeding, so check it explicitly
          # and finish on an exit code we choose.
          schtasks /Query /TN colabapi 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "task still present after uninstall"
            exit 1
          }
          Write-Host "scheduled task installed, queried, and removed cleanly"
          exit 0
        shell: pwsh

      - name: systemd unit installs (Linux only)
        if: runner.os == 'Linux'
        # A CI container has no systemd user bus, so `systemctl --user` cannot
        # succeed; what we can still prove is that we write a valid unit file to
        # the right place rather than crashing.
        run: |
          colabapi service install || true
          test -f ~/.config/systemd/user/colabapi.service
          grep -q 'daemon --foreground' ~/.config/systemd/user/colabapi.service
          echo "systemd unit written correctly"

      - name: Registry registration round-trips (Windows only)
        if: runner.os == 'Windows'
        run: |
          colabapi register
          colabapi doctor
          colabapi unregister

  installer:
    name: install.ps1 end to end (twice)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Twice is the point of this job. The first run may install pipx itself
      # (python -m pipx invocation); the second run always hits the branch where
      # pipx already exists (bare pipx invocation). That second branch is the
      # one every re-run, upgrade, and developer machine takes, and it is the
      # branch an array-slicing bug shipped broken in 0.2.2 -- the package tests
      # all passed while the advertised install command failed. The installer
      # must be EXECUTED, not reasoned about.
      - name: First run (fresh machine path)
        shell: pwsh
        run: ./scripts/install.ps1

      - name: Second run (pipx already present path)
        shell: pwsh
        run: ./scripts/install.ps1

      - name: Installed colabapi actually works
        shell: pwsh
        run: |
          colabapi --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
          colabapi doctor
          if ($LASTEXITCODE -ne 0) { exit 1 }
