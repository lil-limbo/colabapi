name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is the point of this workflow: colabapi's whole claim is
        # that it runs where Google's Colab CLI cannot, and that claim is worth
        # nothing unless it is tested on a real Windows runner every push.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Windows compatibility layer
        run: python tests/test_windows_compat.py

      - name: Real console -- raw mode and injected keystrokes
        # On Windows this allocates a genuine console, flips raw mode through the
        # Win32 API for real, and pushes synthetic arrow/Ctrl+C/Unicode keys into
        # its input queue to assert what the remote shell would receive. This is
        # the only test that exercises the console code rather than reasoning
        # about it. Elsewhere it checks the pure key table and exits.
        run: python tests/test_windows_console.py

      - name: Reconnect state machine
        run: python tests/test_reconnect.py

      - name: WebSocket close semantics
        run: python tests/test_close_semantics.py

      - name: End-to-end console (fake /colab/tty)
        run: python tests/test_e2e_console.py

      - name: CLI starts and reports its environment
        run: |
          colabapi --version
          colabapi doctor

      - name: Google's CLI is driveable through the shim
        run: python -m colabapi._colab_shim --help

      - name: Scheduled Task installs and uninstalls (Windows only)
        if: runner.os == 'Windows'
        # The background service is what keeps a session alive across logout and
        # reboot, so "it registered a task" is a load-bearing claim, not a detail.
        # schtasks must exit 0 and the task must actually be queryable afterwards.
        run: |
          colabapi service install
          schtasks /Query /TN colabapi
          colabapi service status
          colabapi service uninstall
          if (schtasks /Query /TN colabapi 2>$null) {
            Write-Error "task still present after uninstall"; exit 1
          }
          Write-Host "scheduled task installed, queried, and removed cleanly"
        shell: pwsh

      - name: systemd unit installs (Linux only)
        if: runner.os == 'Linux'
        # A CI container has no systemd user bus, so `systemctl --user` cannot
        # succeed; what we can still prove is that we write a valid unit file to
        # the right place rather than crashing.
        run: |
          colabapi service install || true
          test -f ~/.config/systemd/user/colabapi.service
          grep -q 'daemon --foreground' ~/.config/systemd/user/colabapi.service
          echo "systemd unit written correctly"

      - name: Registry registration round-trips (Windows only)
        if: runner.os == 'Windows'
        run: |
          colabapi register
          colabapi doctor
          colabapi unregister
